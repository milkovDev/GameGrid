## DB
quarkus.hibernate-orm.database.default-schema=myapp
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.database.generation.create-schemas=true
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = FM
quarkus.datasource.password = FM
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:8085/FM

## OIDC - Service configuration for Bearer token validation
#local
#quarkus.oidc.auth-server-url=http://localhost:8087/realms/myapp-realm
#online
quarkus.oidc.auth-server-url=https://keycloak.gamegrid.buzz/realms/myapp-realm
quarkus.oidc.client-id=my-quarkus-app
quarkus.oidc.credentials.secret=O6aUcQFepIs64U5VbYBeiL2HlN9dz7U4
quarkus.oidc.application-type=service
quarkus.oidc.authentication.user-info-required=true
quarkus.oidc.token.principal-claim=sub
quarkus.oidc.roles.source=accesstoken

# HTTP Auth Permissions
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# CORS configuration
quarkus.http.cors=true
#local
#quarkus.http.cors.origins=http://localhost:3000
#online
quarkus.http.cors.origins=https://react.gamegrid.buzz
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.exposed-headers=*

# Neo4j config
quarkus.neo4j.uri=bolt://localhost:7687
quarkus.neo4j.authentication.username=neo4j
quarkus.neo4j.authentication.password=password
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.BoltResponse".level=ERROR
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.Bolt.unrecognized".level=ERROR

quarkus.http.port=8080
quarkus.log.category."org.acme.WebSocket".level=DEBUG

quarkus.http.auth.permission.public.paths=/api/images/*
quarkus.http.auth.permission.public.policy=permit